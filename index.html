<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindTrack</title>
    <!-- Tailwind CSS - Optimized delivery -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome - Essential icons only -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Mengoptimalkan performa scrolling agar tidak lag */
        body { -webkit-overflow-scrolling: touch; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Desain tombol agar terasa sangat responsif saat ditekan */
        .btn-active:active { transform: scale(0.96); transition: 0.1s; }
        
        /* Memastikan container selalu pas di layar hp */
        .app-container { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="max-w-md mx-auto bg-white app-container shadow-xl">
        
        <!-- Header: Minimalis & Elegan -->
        <header class="px-6 py-8 flex justify-between items-center bg-white border-b border-slate-100">
            <div>
                <h1 class="text-3xl font-black text-indigo-600 tracking-tight">MindTrack</h1>
                <p class="text-xs text-slate-400 font-medium uppercase tracking-widest mt-1">Belajar tanpa burnout</p>
            </div>
            <div class="h-12 w-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <i class="fas fa-brain text-xl"></i>
            </div>
        </header>

        <main class="flex-1 px-6 py-6 overflow-y-auto">
            
            <!-- Section: Mood Input -->
            <section class="mb-6 fade-in">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-xl">😊</span>
                    <h2 class="text-lg font-bold text-slate-800">Mood Hari Ini</h2>
                </div>
                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 focus-within:border-indigo-300 focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                    <textarea id="moodInput" rows="3" 
                        class="w-full bg-transparent border-none focus:outline-none text-slate-700 placeholder-slate-400 resize-none"
                        placeholder="Capek... banyak tugas banget..."></textarea>
                </div>
                
                <button id="getVibeBtn" onclick="getVibe()" 
                    class="btn-active w-full mt-4 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-pen-nib"></i> Get Vibe
                </button>
            </section>

            <!-- Section: AI Result (Hidden until active) -->
            <section id="suggestionBox" class="hidden mb-8 fade-in">
                <div class="bg-indigo-50 border border-indigo-100 rounded-3xl p-5 relative overflow-hidden">
                    <div class="flex items-center gap-2 mb-3">
                        <i class="fas fa-robot text-indigo-600"></i>
                        <h3 class="text-xs font-black text-indigo-700 uppercase tracking-widest">AI Vibe Check</h3>
                        <span class="absolute top-2 right-4 text-2xl opacity-50">✨</span>
                    </div>
                    <div id="suggestionText" class="text-slate-700 text-sm leading-relaxed font-medium">
                        <!-- Konten AI -->
                    </div>
                </div>
            </section>

            <!-- Section: To-Do List -->
            <section class="fade-in" style="animation-delay: 0.2s">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-list-ul text-indigo-600"></i>
                    <h2 class="text-lg font-bold text-slate-800">Target Harian</h2>
                </div>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="todoInput" 
                        class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
                        placeholder="Apa yang harus selesai?">
                    <button onclick="addTodo()" class="btn-active bg-slate-900 text-white px-5 rounded-xl">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <ul id="todoList" class="space-y-3">
                    <!-- Daftar tugas -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Notification system -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none transition-all duration-300 opacity-0 scale-90">
        <div id="toastContent" class="bg-slate-900 text-white px-6 py-3 rounded-full text-sm shadow-2xl"></div>
    </div>

    <script>
        // API Key (Akan diisi otomatis oleh sistem)
        const apiKey = ""; 

        // Initial Data
        let todos = JSON.parse(localStorage.getItem('mindtrack_todos')) || [
            { text: "Belajar 1 jam", completed: false }
        ];

        // Init App
        window.onload = () => {
            renderTodos();
            document.getElementById('todoInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') addTodo();
            });
        };

        // --- Logic To-Do (Super Ringan) ---
        function renderTodos() {
            const list = document.getElementById('todoList');
            list.innerHTML = todos.length ? '' : `<p class="text-center text-slate-400 text-sm py-4">Belum ada tugas.</p>`;
            
            todos.forEach((todo, i) => {
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 rounded-2xl border transition-all ${todo.completed ? 'bg-slate-50 border-transparent opacity-60' : 'bg-white border-slate-100 shadow-sm'}`;
                li.innerHTML = `
                    <div class="flex items-center gap-3 cursor-pointer flex-1" onclick="toggleTodo(${i})">
                        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${todo.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-300'}">
                            ${todo.completed ? '<i class="fas fa-check text-[10px] text-white"></i>' : ''}
                        </div>
                        <span class="text-sm ${todo.completed ? 'line-through' : ''}">${todo.text}</span>
                    </div>
                    <button onclick="deleteTodo(${i})" class="text-slate-300 hover:text-red-500"><i class="fas fa-times"></i></button>
                `;
                list.appendChild(li);
            });
            localStorage.setItem('mindtrack_todos', JSON.stringify(todos));
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if (!input.value.trim()) return notify("Isi dulu tugasnya ya!");
            todos.unshift({ text: input.value.trim(), completed: false });
            input.value = '';
            renderTodos();
        }

        function toggleTodo(i) { todos[i].completed = !todos[i].completed; renderTodos(); }
        function deleteTodo(i) { todos.splice(i, 1); renderTodos(); }

        // --- Logic AI (Anti-Lag) ---
        async function getVibe() {
            const input = document.getElementById('moodInput');
            const mood = input.value.trim();
            if (!mood) return notify("Ceritakan perasaanmu dulu...");

            const btn = document.getElementById('getVibeBtn');
            const box = document.getElementById('suggestionBox');
            const text = document.getElementById('suggestionText');

            // Set loading state
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Tunggu sebentar...`;
            box.classList.remove('hidden');
            text.innerHTML = "Sedang meracik vibe untukmu...";

            const systemPrompt = "Kamu adalah teman belajar yang suportif. Berikan saran singkat (2-3 kalimat) berdasarkan mood user. Beri semangat dan saran aktivitas kecil.";

            try {
                // Exponential Backoff Fetch
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Mood saya: ${mood}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const result = await response.json();
                const aiMsg = result.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, AI sedang istirahat sebentar. Coba lagi ya!";
                text.innerText = aiMsg;

            } catch (err) {
                text.innerHTML = `<span class="text-red-500">Gagal terhubung. Pastikan internetmu aktif ya!</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-pen-nib"></i> Get Vibe`;
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastContent').innerText = msg;
            t.classList.remove('opacity-0', 'scale-90');
            t.classList.add('opacity-100', 'scale-100');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'scale-100');
                t.classList.add('opacity-0', 'scale-90');
            }, 2500);
        }
    </script>
</body>
</html>
