<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindTrack - Smart Productivity</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --primary-accent: #6366f1;
            --text-main: #1f2937;
            --card-bg: #ffffff;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            text-align: center;
            margin: 10px 0;
        }

        h1 { font-weight: 800; color: var(--primary-accent); font-size: 2rem; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        h3 { margin-bottom: 12px; font-size: 1.1rem; }

        /* Mood Section */
        textarea {
            width: 100%;
            height: 90px;
            border: 2px solid #f3f4f6;
            border-radius: 12px;
            padding: 12px;
            resize: none;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: var(--primary-accent); }

        .btn-vibe {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        #ai-output {
            display: none;
            background: #f5f3ff;
            border-left: 4px solid var(--primary-accent);
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* To-Do Section Upgraded */
        .todo-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .todo-input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #f3f4f6;
            border-radius: 8px;
            outline: none;
        }

        .btn-add {
            padding: 0 15px;
            background: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .todo-text { font-size: 14px; cursor: pointer; }
        .completed { text-decoration: line-through; color: #9ca3af; }

        .btn-delete {
            background: none;
            border: none;
            color: #d1d5db;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }

        .btn-delete:hover { color: var(--danger); }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-accent);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>MindTrack</h1>
    </header>

    <div class="card">
        <h3>Mood Detector</h3>
        <textarea id="mood-input" placeholder="Apa yang kamu rasain sekarang?"></textarea>
        <button class="btn-vibe" onclick="getAIVibe()">Get Vibe</button>
        <div id="ai-output"></div>
    </div>

    <div class="card">
        <h3>Simple To-Do</h3>
        <div class="todo-input-group">
            <input type="text" id="new-todo" placeholder="Tambah tugas baru...">
            <button class="btn-add" onclick="addTodo()">+</button>
        </div>
        <div id="todo-list">
            </div>
    </div>
</div>

<script>
    // --- AI LOGIC ---
    function getAIVibe() {
        const input = document.getElementById('mood-input').value.toLowerCase();
        const outputDiv = document.getElementById('ai-output');
        
        if (!input.trim()) return;

        outputDiv.style.display = "block";
        outputDiv.innerHTML = "✨ <i>MindTrack is thinking...</i>";

        setTimeout(() => {
            let suggestion = "";
            if (input.includes("capek") || input.includes("malas") || input.includes("stres")) {
                suggestion = "<b>Saran AI:</b> Kamu butuh 'Micro-Break'. Stop belajar selama 5 menit, tarik napas, lalu mulai lagi dengan tugas paling ringan.";
            } else if (input.includes("senang") || input.includes("siap") || input.includes("gas")) {
                suggestion = "<b>Saran AI:</b> Energi kamu lagi tinggi! Sikat tugas yang paling sulit sekarang sebelum fokusmu turun.";
            } else {
                suggestion = "<b>Saran AI:</b> Coba dengerin musik instrumen pelan sambil cicil list tugas kamu satu-satu.";
            }
            outputDiv.innerHTML = suggestion;
        }, 600);
    }

    // --- TO-DO LOGIC (CRUD) ---
    const todoList = document.getElementById('todo-list');
    const newTodoInput = document.getElementById('new-todo');

    // Tambah Tugas
    function addTodo() {
        const text = newTodoInput.value.trim();
        if (!text) return;

        const todoItem = document.createElement('div');
        todoItem.className = 'todo-item';
        todoItem.innerHTML = `
            <div class="todo-left">
                <input type="checkbox" onchange="toggleComplete(this)">
                <span class="todo-text">${text}</span>
            </div>
            <button class="btn-delete" onclick="deleteTodo(this)">×</button>
        `;

        todoList.appendChild(todoItem);
        newTodoInput.value = "";
    }

    // Enter untuk tambah
    newTodoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
    });

    // Hapus Tugas
    function deleteTodo(btn) {
        btn.parentElement.remove();
    }

    // Selesai Tugas
    function toggleComplete(checkbox) {
        const textSpan = checkbox.nextElementSibling;
        if (checkbox.checked) {
            textSpan.classList.add('completed');
        } else {
            textSpan.classList.remove('completed');
        }
    }
</script>

</body>
</html>
