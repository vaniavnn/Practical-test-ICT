<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindTrack - Stay Productive</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --primary-accent: #6366f1;
            --text-main: #1f2937;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container & UX Design (Single Page) */
        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-top: 20px;
        }

        h1 { font-weight: 800; color: var(--primary-accent); }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Mood Detector Section */
        textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            resize: none;
            outline: none;
        }

        /* Thumb-friendly Button Area */
        .btn-container {
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        button:active { transform: scale(0.98); }

        /* AI Suggestion Output */
        #ai-output {
            display: none;
            background: #eef2ff;
            border-left: 4px solid var(--primary-accent);
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            font-style: italic;
        }

        /* Simple To-Do List */
        .todo-section h3 { margin-bottom: 10px; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-accent);
        }

        .completed { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>MindTrack</h1>
        <p>Manage your vibe, boost your study.</p>
    </header>

    <div class="card">
        <h3>Mood Detector</h3>
        <textarea id="mood-input" placeholder="Ketik perasaanmu hari ini... (contoh: aku capek banget belajar)"></textarea>
        <div class="btn-container">
            <button onclick="getAIVibe()">Get Vibe</button>
        </div>
        <div id="ai-output"></div>
    </div>

    <div class="card todo-section">
        <h3>Simple To-Do</h3>
        <div id="todo-list">
            <div class="todo-item">
                <input type="checkbox" onchange="toggleTodo(this)">
                <span>Belajar Matematika</span>
            </div>
            <div class="todo-item">
                <input type="checkbox" onchange="toggleTodo(this)">
                <span>Istirahat 15 Menit</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic for AI Suggestion (Simplified for local demo)
    function getAIVibe() {
        const input = document.getElementById('mood-input').value.toLowerCase();
        const outputDiv = document.getElementById('ai-output');
        
        if (input.trim() === "") {
            alert("Ceritakan dulu perasaanmu!");
            return;
        }

        outputDiv.style.display = "block";
        outputDiv.innerHTML = "<em>Analyzing your mood...</em>";

        // Simulasi logika AI Suggestion
        setTimeout(() => {
            let suggestion = "";
            if (input.includes("capek") || input.includes("lelah") || input.includes("pusing")) {
                suggestion = "✨ <b>AI Suggestion:</b> Kamu terlihat butuh istirahat. Coba dengerin musik Lo-Fi selama 10 menit sebelum lanjut lagi ya.";
            } else if (input.includes("semangat") || input.includes("senang") || input.includes("oke")) {
                suggestion = "✨ <b>AI Suggestion:</b> Mood kamu lagi bagus! Ini waktu yang tepat untuk ngerjain tugas yang paling sulit.";
            } else {
                suggestion = "✨ <b>AI Suggestion:</b> Tetap fokus! Coba teknik Pomodoro (25 menit belajar, 5 menit istirahat) supaya tetap produktif.";
            }
            outputDiv.innerHTML = suggestion;
        }, 800);
    }

    // Logic for To-Do
    function toggleTodo(checkbox) {
        const label = checkbox.nextElementSibling;
        if (checkbox.checked) {
            label.classList.add('completed');
        } else {
            label.classList.remove('completed');
        }
    }
</script>

</body>
</html>
