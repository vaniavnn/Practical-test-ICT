<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindTrack</title>
    <!-- Tailwind CSS for minimalist and responsive design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar to maintain minimalist look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
        
        /* Smooth transitions */
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        
        /* Glassmorphism effect for sticky bottom */
        .glass-bottom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased flex justify-center min-h-screen">

    <!-- Mobile-sized App Container -->
    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <!-- Header -->
        <header class="px-6 pt-10 pb-4 bg-white sticky top-0 z-10 border-b border-gray-100">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tight">
                        MindTrack
                    </h1>
                    <p class="text-sm text-gray-500 mt-1">Belajar produktif tanpa burnout.</p>
                </div>
                <div class="h-10 w-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600">
                    <i class="fas fa-brain text-xl"></i>
                </div>
            </div>
        </header>

        <!-- Main Content Area (Scrollable) -->
        <main class="flex-1 overflow-y-auto px-6 py-6 pb-12">
            
            <!-- 1. Mood Detector Section -->
            <section class="mb-8">
                <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="far fa-smile text-yellow-500"></i> Mood Hari Ini
                </h2>
                <div class="bg-gray-50 p-1 rounded-2xl border border-gray-100 shadow-inner mb-4">
                    <textarea id="moodInput" rows="3" 
                        class="w-full bg-transparent border-none focus:ring-0 resize-none p-3 text-gray-700 placeholder-gray-400"
                        placeholder="Ceritakan apa yang kamu rasakan hari ini... Lelah? Semangat? Cemas karena ujian?"></textarea>
                </div>
                
                <!-- "Get Vibe" Button (Moved directly below the input) -->
                <button id="getVibeBtn" onclick="getVibe()" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-md">
                    <i class="fas fa-magic"></i> Get Vibe
                </button>
            </section>

            <!-- 2. AI Suggestion Result Box (Hidden by default) -->
            <section id="suggestionBox" class="mb-8 hidden transition-all duration-500 transform translate-y-2 opacity-0">
                <div class="bg-gradient-to-br from-indigo-50 to-purple-50 p-5 rounded-2xl border border-indigo-100 relative">
                    <div class="absolute -top-3 -right-2 text-3xl">✨</div>
                    <h3 class="text-sm font-bold text-indigo-800 mb-2 uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-robot"></i> AI Vibe Check
                    </h3>
                    <div id="suggestionText" class="text-gray-700 text-sm leading-relaxed">
                        <!-- AI text will appear here -->
                    </div>
                </div>
            </section>

            <!-- 3. Simple To-Do Section -->
            <section>
                <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fas fa-tasks text-indigo-500"></i> Target Harian
                </h2>
                
                <!-- Add Task Input -->
                <div class="flex gap-2 mb-4">
                    <input type="text" id="todoInput" 
                        class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="Tambah tugas baru...">
                    <button onclick="addTodo()" class="bg-gray-800 text-white px-5 py-3 rounded-xl hover:bg-gray-900 active:scale-95 transition-all shadow-md">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <!-- Task List -->
                <ul id="todoList" class="space-y-3">
                    <!-- Tasks will be injected here -->
                </ul>
            </section>

        </main>

    </div>

    <!-- Minimalist Toast Notification Container -->
    <div id="toastContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <script>
        // API Configuration (Provided by environment at runtime)
        const apiKey = ""; 

        // State Management for To-Do List
        let todos = [
            { text: "Review materi bab 1", completed: false },
            { text: "Istirahat 15 menit", completed: true }
        ];

        // Ensure DOM is fully loaded before rendering
        document.addEventListener('DOMContentLoaded', () => {
            renderTodos();
            
            // Allow Enter key to add task
            document.getElementById('todoInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') addTodo();
            });
        });

        // --- TO-DO LIST LOGIC ---

        function renderTodos() {
            const list = document.getElementById('todoList');
            list.innerHTML = '';
            
            if(todos.length === 0) {
                 list.innerHTML = `
                    <div class="text-center py-6 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50">
                        <p class="text-gray-400 text-sm"><i class="fas fa-check-circle mb-2 text-xl block"></i>Belum ada tugas.</p>
                    </div>`;
                 return;
            }

            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 bg-white rounded-xl shadow-sm border ${todo.completed ? 'border-green-200 bg-green-50/50' : 'border-gray-100'} transition-all`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden cursor-pointer" onclick="toggleTodo(${index})">
                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${todo.completed ? 'border-green-500 bg-green-500' : 'border-gray-300'}">
                            ${todo.completed ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                        </div>
                        <span class="truncate text-sm font-medium ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'}">
                            ${escapeHtml(todo.text)}
                        </span>
                    </div>
                    <button onclick="deleteTodo(event, ${index})" class="text-gray-300 hover:text-red-500 p-2 ml-2 transition-colors focus:outline-none">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if(text) {
                todos.unshift({ text, completed: false }); // Add to top
                input.value = '';
                renderTodos();
            } else {
                showToast("Tugas tidak boleh kosong!", "warning");
            }
        }

        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            renderTodos();
        }

        function deleteTodo(event, index) {
            event.stopPropagation(); // Prevent triggering toggleTodo
            todos.splice(index, 1);
            renderTodos();
        }

        // --- AI GEMINI INTEGRATION LOGIC ---

        // Helper: Exponential Backoff for API Call
        async function fetchWithBackoff(url, options, maxRetries = 5) {
            let delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function getVibe() {
            const moodInput = document.getElementById('moodInput');
            const moodText = moodInput.value.trim();
            
            if(!moodText) {
                showToast("Ceritakan perasaanmu dulu di kolom atas ya! \u270D\uFE0F", "warning");
                moodInput.focus();
                return;
            }

            const btn = document.getElementById('getVibeBtn');
            const box = document.getElementById('suggestionBox');
            const textDisplay = document.getElementById('suggestionText');

            // UI Loading State
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Meracik Vibe...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            box.classList.remove('hidden');
            // Small delay for animation trigger
            setTimeout(() => {
                box.classList.remove('opacity-0', 'translate-y-2');
                box.classList.add('opacity-100', 'translate-y-0');
            }, 10);
            
            textDisplay.innerHTML = `
                <div class="flex animate-pulse space-x-2 items-center text-indigo-400 py-2">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full"></div>
                    <span class="ml-2 italic">Menganalisis mood kamu...</span>
                </div>`;

            // System Prompt instructing AI behavior
            const systemPrompt = `Kamu adalah MindTrack AI, asisten yang fokus pada produktivitas dan kesejahteraan mental pelajar. 
Berdasarkan input perasaan/mood pengguna, berikan 1 paragraf singkat (maksimal 3 kalimat).
Saran harus berisi:
1. Validasi perasaannya secara empati.
2. Rekomendasi aktivitas spesifik (apakah harus lanjut belajar, metode belajarnya, atau wajib istirahat).
3. (Opsional) Saran genre musik yang cocok.
Gunakan bahasa Indonesia yang santai, bersahabat, dan tidak kaku.`;

            const payload = {
                contents: [{ parts: [{ text: `Perasaan saya hari ini: ${moodText}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const data = await fetchWithBackoff(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }
                );

                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (responseText) {
                    // Typewriter effect for cool UX
                    textDisplay.innerHTML = '';
                    typeWriter(responseText, textDisplay, 0);
                } else {
                    throw new Error("No response");
                }

            } catch (error) {
                console.error("API Error:", error);
                textDisplay.innerHTML = `<span class="text-red-500 font-medium"><i class="fas fa-exclamation-triangle"></i> Gagal terhubung ke AI. Pastikan koneksi internetmu stabil dan coba lagi.</span>`;
            } finally {
                // Restore Button State
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> Get Vibe';
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // --- UTILITIES ---

        // Typewriter effect function
        function typeWriter(text, element, index) {
            if (index < text.length) {
                // Handle basic formatting (like newlines)
                if(text.charAt(index) === '\n') {
                    element.innerHTML += '<br>';
                } else {
                    element.innerHTML += text.charAt(index);
                }
                setTimeout(() => typeWriter(text, element, index + 1), 15); // Speed of typing
            }
        }

        // Security Utility to prevent XSS in To-Do
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Custom Toast Notification (Replaces native alerts)
        function showToast(message, type = "info") {
            const toast = document.createElement('div');
            const icon = type === 'warning' ? '<i class="fas fa-exclamation-circle text-yellow-500"></i>' : '<i class="fas fa-info-circle text-blue-500"></i>';
            
            toast.className = `bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg text-sm font-medium flex items-center gap-2 transform transition-all duration-300 translate-y-[-100%] opacity-0`;
            toast.innerHTML = `${icon} ${message}`;
            
            document.getElementById('toastContainer').appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-y-[-100%]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            }, 10);

            // Animate out and remove
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-100%]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
</body>
</html>
